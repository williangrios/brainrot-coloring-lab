<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <!-- Dinosaur coloring page - each region is a separate path -->

  <!-- Sky background -->
  <path id="sky" d="M0,0 H400 V350 H0 Z" fill="white" stroke="none"/>

  <!-- Ground -->
  <path id="ground" d="M0,350 C50,340 100,355 150,345 C200,355 250,340 300,350 C350,340 400,350 400,345 L400,500 L0,500 Z" fill="white" stroke="black" stroke-width="2"/>

  <!-- Dino body -->
  <path id="dino-body" d="M120,280 C100,260 90,230 100,200 C110,180 130,170 150,170 L250,170 C270,170 280,180 285,195 C290,210 295,240 280,270 C270,290 250,310 230,320 L170,320 C150,310 130,300 120,280 Z" fill="white" stroke="black" stroke-width="2.5"/>

  <!-- Dino belly -->
  <path id="dino-belly" d="M140,260 C135,240 140,220 155,210 C170,200 200,200 220,210 C240,220 250,240 245,260 C240,280 220,295 200,300 C175,300 150,285 140,260 Z" fill="white" stroke="black" stroke-width="2"/>

  <!-- Dino head -->
  <path id="dino-head" d="M250,170 C260,150 280,130 310,125 C340,120 360,130 365,150 C370,170 360,190 340,200 C320,210 290,210 270,200 C255,190 250,180 250,170 Z" fill="white" stroke="black" stroke-width="2.5"/>

  <!-- Dino mouth / jaw -->
  <path id="dino-jaw" d="M310,180 C320,185 340,190 355,185 C365,180 370,170 365,165 C355,175 340,178 325,175 Z" fill="white" stroke="black" stroke-width="2"/>

  <!-- Dino eye -->
  <circle id="dino-eye-outer" cx="320" cy="148" r="14" fill="white" stroke="black" stroke-width="2"/>
  <circle id="dino-eye-inner" cx="322" cy="146" r="6" fill="black" stroke="none"/>

  <!-- Dino spikes (back) -->
  <path id="spike1" d="M160,170 L170,140 L180,170" fill="white" stroke="black" stroke-width="2" stroke-linejoin="round"/>
  <path id="spike2" d="M185,170 L198,132 L210,170" fill="white" stroke="black" stroke-width="2" stroke-linejoin="round"/>
  <path id="spike3" d="M215,170 L230,138 L245,170" fill="white" stroke="black" stroke-width="2" stroke-linejoin="round"/>

  <!-- Dino tail -->
  <path id="dino-tail" d="M120,280 C100,290 70,295 50,280 C30,265 20,240 30,225 C40,215 55,220 60,235 C65,250 80,270 120,275 Z" fill="white" stroke="black" stroke-width="2.5"/>

  <!-- Front leg -->
  <path id="leg-front" d="M240,310 L245,360 C245,370 255,370 255,360 L252,310" fill="white" stroke="black" stroke-width="2.5"/>

  <!-- Front foot -->
  <path id="foot-front" d="M240,358 C235,370 240,380 250,380 C260,380 265,370 260,358 Z" fill="white" stroke="black" stroke-width="2"/>

  <!-- Back leg -->
  <path id="leg-back" d="M160,315 L155,360 C155,370 165,370 165,360 L168,315" fill="white" stroke="black" stroke-width="2.5"/>

  <!-- Back foot -->
  <path id="foot-back" d="M150,358 C145,370 150,380 160,380 C170,380 175,370 170,358 Z" fill="white" stroke="black" stroke-width="2"/>

  <!-- Sun -->
  <circle id="sun" cx="60" cy="60" r="35" fill="white" stroke="black" stroke-width="2"/>

  <!-- Sun rays -->
  <line x1="60" y1="15" x2="60" y2="5" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="105" x2="60" y2="115" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <line x1="15" y1="60" x2="5" y2="60" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <line x1="105" y1="60" x2="115" y2="60" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="30" x2="22" y2="22" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <line x1="90" y1="30" x2="98" y2="22" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="90" x2="22" y2="98" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <line x1="90" y1="90" x2="98" y2="98" stroke="black" stroke-width="2" stroke-linecap="round"/>

  <!-- Cloud 1 -->
  <path id="cloud1" d="M250,70 C245,50 260,35 280,40 C290,25 315,25 325,40 C340,35 355,45 352,62 C365,70 360,90 345,90 L260,90 C245,90 240,80 250,70 Z" fill="white" stroke="black" stroke-width="2"/>

  <!-- Cloud 2 -->
  <path id="cloud2" d="M140,110 C137,95 148,85 162,88 C168,78 185,78 192,88 C202,84 213,92 210,104 C218,108 215,122 205,122 L148,122 C138,122 134,115 140,110 Z" fill="white" stroke="black" stroke-width="2"/>

  <!-- Small plant 1 -->
  <path id="plant1" d="M330,350 L330,400 M330,370 C320,360 310,365 315,375 M330,380 C340,370 350,375 345,385" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>

  <!-- Small plant 2 -->
  <path id="plant2" d="M80,350 L80,400 M80,365 C70,355 60,360 65,370 M80,375 C90,365 100,370 95,380" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>
</svg>
