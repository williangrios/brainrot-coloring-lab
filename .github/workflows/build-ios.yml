name: Build iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS locally
        run: eas build --platform ios --profile production --local --non-interactive --output ./BrainrotColoring.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: BrainrotColoring-iOS
          path: ./BrainrotColoring.ipa

      - name: Download instructions
        run: |
          echo "============================================"
          echo "  BUILD IOS CONCLUIDO"
          echo "============================================"
          echo ""
          echo "Para baixar o IPA:"
          echo "1. Acesse a aba Actions no GitHub"
          echo "2. Clique neste run"
          echo "3. Role ate a secao Artifacts"
          echo "4. Clique em 'BrainrotColoring-iOS' para baixar"
          echo ""
          echo "============================================"
