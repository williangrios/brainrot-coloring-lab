name: Build iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS locally
        run: eas build --platform ios --profile production --local --output ./BrainrotColoring.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: BrainrotColoring-iOS
          path: ./BrainrotColoring.ipa
