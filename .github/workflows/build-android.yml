name: Build Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android locally
        run: eas build --platform android --profile production --local --non-interactive --output ./BrainrotColoring.aab

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: BrainrotColoring-Android
          path: ./BrainrotColoring.aab

      - name: Download instructions
        run: |
          echo "============================================"
          echo "  BUILD ANDROID CONCLUIDO"
          echo "============================================"
          echo ""
          echo "Para baixar o AAB:"
          echo "1. Acesse a aba Actions no GitHub"
          echo "2. Clique neste run"
          echo "3. Role ate a secao Artifacts"
          echo "4. Clique em 'BrainrotColoring-Android' para baixar"
          echo ""
          echo "============================================"
