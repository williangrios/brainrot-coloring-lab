name: Build & Publish to Stores

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Plataforma para build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - android
          - ios

jobs:
  # ─── Build Android ────────────────────────────────
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.platform != 'ios' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Decode Google Service Account
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}' | base64 --decode > google-service-account.json

      - name: Build Android locally
        run: eas build --platform android --profile production --local --non-interactive --output ./BrainrotColoring.aab

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BrainrotColoring-Android
          path: ./BrainrotColoring.aab

      - name: Download instructions
        run: |
          echo "============================================"
          echo "  BUILD ANDROID CONCLUIDO"
          echo "============================================"
          echo ""
          echo "Para baixar o AAB:"
          echo "1. Acesse a aba Actions no GitHub"
          echo "2. Clique neste run"
          echo "3. Role ate a secao Artifacts"
          echo "4. Clique em 'BrainrotColoring-Android' para baixar"
          echo ""
          echo "============================================"

  # ─── Build iOS ────────────────────────────────────
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.platform != 'android' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS locally
        run: eas build --platform ios --profile production --local --non-interactive --output ./BrainrotColoring.ipa

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BrainrotColoring-iOS
          path: ./BrainrotColoring.ipa

      - name: Download instructions
        run: |
          echo "============================================"
          echo "  BUILD IOS CONCLUIDO"
          echo "============================================"
          echo ""
          echo "Para baixar o IPA:"
          echo "1. Acesse a aba Actions no GitHub"
          echo "2. Clique neste run"
          echo "3. Role ate a secao Artifacts"
          echo "4. Clique em 'BrainrotColoring-iOS' para baixar"
          echo ""
          echo "============================================"
